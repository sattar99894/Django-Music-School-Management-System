{% extends "base.html" %}
{% block title %}پرداخت ناموفق{% endblock %}
{% block content %}
<div class="mx-auto max-w-xl px-4 py-20 text-center">
    <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-red-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </div>
    <h1 class="mt-6 text-3xl font-extrabold text-stone-900">پرداخت ناموفق بود</h1>
    <p class="mt-3 text-stone-600">متأسفانه پرداخت شما با موفقیت انجام نشد یا لغو گردید.</p>
    {% if authority %}<p class="mt-2 text-xs text-stone-400" dir="ltr">Authority: {{ authority }}</p>{% endif %}
    <div class="mt-8 flex justify-center gap-3">
        <a href="{% url 'core:course_list' %}" class="rounded-xl brand-gradient px-6 py-3 font-semibold text-white hover:opacity-90">بازگشت به دوره‌ها</a>
        <a href="{% url 'core:landing' %}" class="rounded-xl border border-stone-300 px-6 py-3 font-semibold hover:bg-stone-100">صفحه اصلی</a>
    </div>
</div>
{% endblock %}
